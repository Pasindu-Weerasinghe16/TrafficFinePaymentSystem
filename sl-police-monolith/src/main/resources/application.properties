# Spring Boot Application Configuration
spring.application.name=sl-police-monolith
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/traffic_fine
spring.datasource.username=traffic_fine
spring.datasource.password=traffic_fine
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
jwt.secret=your-super-secret-jwt-key-change-this-in-production-environment-very-important
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.slpolice.monolith=DEBUG

# Dynamic master/replica data source connection parameters will be added here.
