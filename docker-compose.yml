services:
  sl-police-nginx:
    build:
      context: ./sl-police-nginx
      args:
        NGINX_VERSION: ${NGINX_VERSION}
    image: dockerpasindu/sl-police-nginx:1.0.0
    container_name: sl-police-nginx
    ports:
      - "80:80"
    depends_on:
      - sl-police-gateway
      - sl-police-monolith

  sl-police-gateway:
    build:
      context: ./sl-police-gateway
      args:
        SPRING_BOOT_BASE_IMAGE: ${SPRING_BOOT_BASE_IMAGE}
    image: dockerpasindu/sl-police-gateway:1.0.0
    container_name: sl-police-gateway
    working_dir: /workspace
    command: ["sh", "-c", "sleep infinity"]
    ports:
      - "8080:8080"

  sl-police-monolith:
    build:
      context: ./sl-police-monolith
      args:
        SPRING_BOOT_BASE_IMAGE: ${SPRING_BOOT_BASE_IMAGE}
    image: dockerpasindu/sl-police-monolith:1.0.0
    container_name: sl-police-monolith
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://sl-police-postgres-primary:5432/traffic_fine
      SPRING_DATASOURCE_USERNAME: traffic_fine
      SPRING_DATASOURCE_PASSWORD: traffic_fine
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SERVER_PORT: 8081
    depends_on:
      - sl-police-postgres-primary

  sl-police-postgres-primary:
    image: postgres:${POSTGRES_VERSION}
    container_name: sl-police-postgres-primary
    environment:
      POSTGRES_DB: traffic_fine
      POSTGRES_USER: traffic_fine
      POSTGRES_PASSWORD: traffic_fine
    ports:
      - "5435:5432"
    volumes:
      - sl_police_postgres_primary_data:/var/lib/postgresql/data

  sl-police-postgres-replica:
    image: postgres:${POSTGRES_VERSION}
    container_name: sl-police-postgres-replica
    environment:
      POSTGRES_DB: traffic_fine
      POSTGRES_USER: traffic_fine
      POSTGRES_PASSWORD: traffic_fine
    ports:
      - "5436:5432"
    volumes:
      - sl_police_postgres_replica_data:/var/lib/postgresql/data

  sl-police-mobile-app:
    build:
      context: ./sl-police-mobile-app
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE}
    image: dockerpasindu/sl-police-mobile-app:1.0.0
    container_name: sl-police-mobile-app
    ports:
      - "8082:8082"

  sl-police-motorist-portal:
    build:
      context: ./sl-police-motorist-portal
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE}
    image: dockerpasindu/sl-police-motorist-portal:1.0.0
    container_name: sl-police-motorist-portal
    ports:
      - "3000:3000"

  sl-police-admin-portal:
    build:
      context: ./sl-police-admin-portal
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE}
    image: dockerpasindu/sl-police-admin-portal:1.0.0
    container_name: sl-police-admin-portal
    ports:
      - "3001:3001"

volumes:
  sl_police_postgres_primary_data:
  sl_police_postgres_replica_data:
